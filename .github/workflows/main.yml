name: CI

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "*"
  merge_group:
    branches:
      - "master"

permissions:
  # Required to manage and delete caches.
  actions: write
  # Default permission for checking out code.
  contents: read

concurrency:
  # Cancel any previous workflows if they are from a PR or push.
  group: ${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # Accepts either a major image tag like "30" or a patch tag like "29.1".
  BITCOIN_VERSION: "31"
  
  # TRANCHES defines the number of tranches used in the itests.
  TRANCHES: 16

  # SMALL_TRANCHES defines the number of tranches used in the less stable itest
  # builds
  #
  # TODO(yy): remove this value and use TRANCHES.
  SMALL_TRANCHES: 8

  # SPLIT_TRANCHES defines the total number of tranches used by the
  # tranche-split itest configurations, spread over
  # SPLIT_TRANCHES / SPLIT_ITEST_PARALLELISM runner jobs.
  SPLIT_TRANCHES: 16

  # SPLIT_ITEST_PARALLELISM defines the number of tranches each runner job
  # of a tranche-split itest configuration runs in parallel.
  SPLIT_ITEST_PARALLELISM: 4

  # If you change this please also update GO_VERSION in Makefile (then run
  # `make lint` to see where else it needs to be updated as well).
  GO_VERSION: 1.26.4

  # DB_UNIT_PKGS is the list of packages whose unit tests exercise the
  # configurable database backends, i.e. the packages whose tests behave
  # differently under the kvdb_* and test_db_* build tags (they construct
  # test stores via kvdb.GetTestBackend, channeldb.MakeTestDB, the sqldb
  # test constructors or their wrappers). The DB-variant unit and race
  # jobs run only these packages; all other packages run identically in
  # the plain unit jobs.
  DB_UNIT_PKGS: >-
    autopilot batch chainparams channeldb cluster contractcourt graph
    graph/db graph/db/migration1 invoices kvdb kvdb/etcd kvdb/postgres
    kvdb/sqlbase kvdb/sqlite payments/db payments/db/migration1 routing
    sqldb sweep

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          # Needed for some checks.
          fetch-depth: 0

      - name: Clean up runner space
        uses: ./.github/actions/cleanup-space

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          use-build-cache: 'no'

      ########################
      # sample configuration check
      ########################
      - name: Check default values in sample-lnd.conf file
        run: make sample-conf-check

      ########################
      # Check code and RPC format
      ########################
      - name: Check code format
        run: make fmt-check

      - name: Check go modules tidiness 
        run: make tidy-module-check

      - name: Lint proto files
        run: make protolint

      ########################
      # SQLC code gen check 
      ########################
      - name: Docker image cache
        uses: satackey/action-docker-layer-caching@v0.0.11
        # Ignore the failure of a step and avoid terminating the job.
        continue-on-error: true

      - name: Check SQL models
        run: make sqlc-check

      ########################
      # RPC and mobile compilation check
      ########################
      - name: Check RPC format
        run: make rpc-check

      - name: Check JSON/WASM stub compilation
        run: make rpc-js-compile

      - name: Check mobile RPC bindings
        run: make mobile-rpc

      - name: Check mobile specific code
        run: go build --tags="mobile" ./mobile

      ########################
      # check pinned dependencies
      ########################
      - name: Check pinned dependencies
        run: |
          while read -r dep; do
            if ! grep -q "$dep" go.mod; then
              echo "dependency $dep should not be altered"
              exit 1
            fi
          done <<EOF
          google.golang.org/grpc v1.79.3
          github.com/golang/protobuf v1.5.4
          EOF

      ########################
      # check PR updates release notes
      ########################
      - name: Check for no-changelog label
        id: check-changelog-label
        uses: ./.github/actions/check-label
        with:
          label: 'no-changelog'
          skip-message: "Changelog check auto-passed due to 'no-changelog' label"

      - name: Release notes check
        if: steps.check-changelog-label.outputs.skip != 'true'
        run: scripts/check-release-notes.sh

  ########################
  # check commits
  ########################
  check-commits:
    if: github.event_name == 'pull_request'
    name: Check commits
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Clean up runner space
        uses: ./.github/actions/cleanup-space

      - name: setup go ${{ env.GO_VERSION }}
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          # Use the same cache from unit test job to save time.
          key-prefix: unit-test

      - name: fetch and rebase on ${{ github.base_ref }}
        uses: ./.github/actions/rebase

      - name: check commits
        run: scripts/check-each-commit.sh upstream/${{ github.base_ref }}

  ########################
  # lint code
  ########################
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Clean up runner space
        uses: ./.github/actions/cleanup-space

      - name: setup go ${{ env.GO_VERSION }}
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          # Use the same cache from unit test job to save time.
          key-prefix: unit-test

      - name: lint
        run: GOGC=50 make lint

  ########################
  # cross compilation
  ########################
  cross-compile:
    name: Cross compilation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        # Please keep this list in sync with make/release_flags.mk!
        include:
          - name: i386
            sys: freebsd-386 linux-386 windows-386
          - name: amd64
            sys: darwin-amd64 freebsd-amd64 linux-amd64 netbsd-amd64 openbsd-amd64 windows-amd64
          - name: arm
            sys: darwin-arm64 freebsd-arm linux-armv6 linux-armv7 linux-arm64 windows-arm64
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - name: Clean up runner space
        uses: ./.github/actions/cleanup-space

      - name: Setup go ${{ env.GO_VERSION }}
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          key-prefix: cross-compile
          use-build-cache: 'no'

      - name: Build release for all architectures
        run: make release sys="${{ matrix.sys }}"

  ########################
  # run unit tests
  ########################
  unit-test:
    name: Run unit tests
    runs-on: ubuntu-latest
    strategy:
      # Allow other tests in the matrix to continue if one fails.
      fail-fast: false
      matrix:
        unit_type:
          - unit-cover
          - unit tags="kvdb_etcd" pkg="$DB_UNIT_PKGS"
          - unit tags="kvdb_postgres" pkg="$DB_UNIT_PKGS"
          - unit tags="kvdb_sqlite" pkg="$DB_UNIT_PKGS"
          - unit tags="test_db_sqlite" pkg="$DB_UNIT_PKGS"
          - unit tags="test_db_postgres" pkg="$DB_UNIT_PKGS"
          - unit-module

    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Clean up runner space
        uses: ./.github/actions/cleanup-space

      - name: Fetch and rebase on ${{ github.base_ref }}
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/rebase

      - name: Git checkout fuzzing seeds
        uses: actions/checkout@v5
        with:
          repository: lightninglabs/lnd-fuzz
          path: lnd-fuzz

      - name: Rsync fuzzing seeds
        run: rsync -a --ignore-existing lnd-fuzz/ ./

      - name: Setup go ${{ env.GO_VERSION }}
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          key-prefix: unit-test

      - name: Install bitcoind
        run: ./scripts/install_bitcoind.sh $BITCOIN_VERSION

      - name: Run ${{ matrix.unit_type }}
        run: make ${{ matrix.unit_type }}

      - name: Clean coverage
        run: grep -Ev '(\.pb\.go|\.pb\.json\.go|\.pb\.gw\.go)' coverage.txt > coverage-norpc.txt
        if: matrix.unit_type == 'unit-cover'

      - name: Send coverage
        uses: coverallsapp/github-action@v2
        if: matrix.unit_type == 'unit-cover'
        continue-on-error: true
        with:
          file: coverage-norpc.txt
          flag-name: 'unit'
          format: 'golang'
          parallel: true


  ########################
  # run unit tests in race detector mode
  ########################
  unit-race:
    name: Unit race (${{ matrix.name }}, ${{ matrix.tranche }})
    runs-on: ubuntu-latest
    strategy:
      # Allow other tests in the matrix to continue if one fails.
      fail-fast: false
      matrix:
        # The plain flavor runs the full suite split into four tranches.
        # The DB flavors only run the DB-touching packages (see
        # DB_UNIT_PKGS), split into two tranches each.
        include:
          - name: unit-race
            args: ''
            tranche: 0
            tranches: 4
          - name: unit-race
            args: ''
            tranche: 1
            tranches: 4
          - name: unit-race
            args: ''
            tranche: 2
            tranches: 4
          - name: unit-race
            args: ''
            tranche: 3
            tranches: 4
          - name: unit-race-sqlite
            args: tags="test_db_sqlite" pkg="$DB_UNIT_PKGS"
            tranche: 0
            tranches: 2
          - name: unit-race-sqlite
            args: tags="test_db_sqlite" pkg="$DB_UNIT_PKGS"
            tranche: 1
            tranches: 2
          - name: unit-race-postgres
            args: tags="test_db_postgres" pkg="$DB_UNIT_PKGS"
            tranche: 0
            tranches: 2
          - name: unit-race-postgres
            args: tags="test_db_postgres" pkg="$DB_UNIT_PKGS"
            tranche: 1
            tranches: 2

    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Clean up runner space
        uses: ./.github/actions/cleanup-space

      - name: Fetch and rebase on ${{ github.base_ref }}
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/rebase

      - name: Git checkout fuzzing seeds
        uses: actions/checkout@v5
        with:
          repository: lightninglabs/lnd-fuzz
          path: lnd-fuzz

      - name: Rsync fuzzing seeds
        run: rsync -a --ignore-existing lnd-fuzz/ ./

      - name: Setup go ${{ env.GO_VERSION }}
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          key-prefix: unit-test

      - name: Install bitcoind
        run: ./scripts/install_bitcoind.sh $BITCOIN_VERSION

      - name: Run ${{ matrix.name }} tranche ${{ matrix.tranche }}
        run: make unit-race-parallel tranche=${{ matrix.tranche }} tranches=${{ matrix.tranches }} ${{ matrix.args }}

  ########################
  # run integration tests with TRANCHES
  ########################
  basic-integration-test:
    name: Run basic itests
    runs-on: ubuntu-latest
    strategy:
      # Allow other tests in the matrix to continue if one fails.
      fail-fast: false
      matrix:
        include:
          - name: btcd
            args: backend=btcd cover=1
          - name: bitcoind
            args: backend=bitcoind cover=1
          - name: bitcoind-miner
            args: backend=bitcoind minerbackend=bitcoind cover=1
          - name: bitcoind-notxindex
            args: backend="bitcoind notxindex"
          - name: neutrino
            args: backend=neutrino cover=1
    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for no-itest label
        id: check-label
        uses: ./.github/actions/check-label
        with:
          label: 'no-itest'
          skip-message: "Tests auto-passed due to 'no-itest' label"

      - name: Clean up runner space
        if: steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/cleanup-space

      - name: Fetch and rebase on ${{ github.base_ref }}
        if: github.event_name == 'pull_request' && steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/rebase

      - name: Setup go ${{ env.GO_VERSION }}
        if: steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          key-prefix: integration-test

      - name: Install bitcoind
        if: steps.check-label.outputs.skip != 'true'
        run: ./scripts/install_bitcoind.sh $BITCOIN_VERSION

      - name: Run ${{ matrix.name }}
        if: steps.check-label.outputs.skip != 'true'
        run: make itest-parallel tranches=${{ env.TRANCHES }} ${{ matrix.args }} shuffleseed=${{ github.run_id }}${{ strategy.job-index }}

      - name: Clean coverage
        run: grep -Ev '(\.pb\.go|\.pb\.json\.go|\.pb\.gw\.go)' coverage.txt > coverage-norpc.txt
        if: ${{ contains(matrix.args, 'cover=1') && steps.check-label.outputs.skip != 'true' }}

      - name: Send coverage
        if: ${{ contains(matrix.args, 'cover=1') && steps.check-label.outputs.skip != 'true' }}
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          file: coverage-norpc.txt
          flag-name: 'itest-${{ matrix.name }}'
          format: 'golang'
          parallel: true

      - name: Zip log files on failure
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        timeout-minutes: 5 # timeout after 5 minute
        run: 7z a logs-itest-${{ matrix.name }}.zip itest/**/*.log itest/postgres.log

      - name: Upload log files on failure
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        with:
          name: logs-itest-${{ matrix.name }}
          path: logs-itest-${{ matrix.name }}.zip
          retention-days: 5

  ########################
  # run integration tests with SMALL_TRANCHES
  ########################
  integration-test:
    name: Run itests
    runs-on: ubuntu-latest
    strategy:
      # Allow other tests in the matrix to continue if one fails.
      fail-fast: false
      matrix:
        include:
          - name: bitcoind-rpcpolling
            args: backend="bitcoind rpcpolling"
          - name: bitcoind-etcd
            args: backend=bitcoind dbbackend=etcd
          - name: bitcoind-sqlite
            args: backend=bitcoind dbbackend=sqlite
          - name: bitcoind-sqlite-nativesql
            args: backend=bitcoind dbbackend=sqlite nativesql=true
          - name: bitcoind-sqlite=nativesql-experiment
            args: backend=bitcoind dbbackend=sqlite nativesql=true tags=test_native_sql
    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for no-itest label
        id: check-label
        uses: ./.github/actions/check-label
        with:
          label: 'no-itest'
          skip-message: "Tests auto-passed due to 'no-itest' label"

      - name: Clean up runner space
        if: steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/cleanup-space

      - name: Fetch and rebase on ${{ github.base_ref }}
        if: github.event_name == 'pull_request' && steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/rebase

      - name: Setup go ${{ env.GO_VERSION }}
        if: steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          key-prefix: integration-test

      - name: Install bitcoind
        if: steps.check-label.outputs.skip != 'true'
        run: ./scripts/install_bitcoind.sh $BITCOIN_VERSION

      - name: Run ${{ matrix.name }}
        if: steps.check-label.outputs.skip != 'true'
        run: make itest-parallel tranches=${{ env.SMALL_TRANCHES }} ${{ matrix.args }} shuffleseed=${{ github.run_id }}${{ strategy.job-index }}

      - name: Clean coverage
        run: grep -Ev '(\.pb\.go|\.pb\.json\.go|\.pb\.gw\.go)' coverage.txt > coverage-norpc.txt
        if: ${{ contains(matrix.args, 'cover=1') && steps.check-label.outputs.skip != 'true' }}

      - name: Send coverage
        if: ${{ contains(matrix.args, 'cover=1') && steps.check-label.outputs.skip != 'true' }}
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          file: coverage-norpc.txt
          flag-name: 'itest-${{ matrix.name }}'
          format: 'golang'
          parallel: true

      - name: Zip log files on failure
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        timeout-minutes: 5 # timeout after 5 minute
        run: 7z a logs-itest-${{ matrix.name }}.zip itest/**/*.log

      - name: Upload log files on failure
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        with:
          name: logs-itest-${{ matrix.name }}
          path: logs-itest-${{ matrix.name }}.zip
          retention-days: 5


  ########################
  # build binaries for tranche-split integration tests
  ########################
  build-split-itest:
    name: Build split itest binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bitcoind-postgres
            args: backend=bitcoind dbbackend=postgres
          - name: bitcoind-postgres-experiment
            args: backend=bitcoind dbbackend=postgres tags=test_native_sql
    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for no-itest label
        id: check-label
        uses: ./.github/actions/check-label
        with:
          label: 'no-itest'
          skip-message: "Tests auto-passed due to 'no-itest' label"

      - name: Clean up runner space
        if: steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/cleanup-space

      - name: Fetch and rebase on ${{ github.base_ref }}
        if: github.event_name == 'pull_request' && steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/rebase

      - name: Setup go ${{ env.GO_VERSION }}
        if: steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          key-prefix: integration-test

      - name: Build itest binaries for ${{ matrix.name }}
        if: steps.check-label.outputs.skip != 'true'
        run: make build-itest ${{ matrix.args }}

      - name: Upload itest binaries
        if: steps.check-label.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: itest-binaries-${{ matrix.name }}
          path: |
            itest/itest.test
            itest/lnd-itest
            itest/btcd-itest
          retention-days: 1

  ########################
  # run tranche-split integration tests
  ########################
  split-integration-test:
    name: Split itests (${{ matrix.config.name }}, ${{ matrix.tranche_group }})
    runs-on: ubuntu-latest
    needs: build-split-itest
    strategy:
      # Allow other tests in the matrix to continue if one fails.
      fail-fast: false
      matrix:
        # Each tranche group runs SPLIT_ITEST_PARALLELISM tranches, so
        # this list must contain SPLIT_TRANCHES / SPLIT_ITEST_PARALLELISM
        # entries.
        tranche_group: [0, 1, 2, 3]
        config:
          - name: bitcoind-postgres
            binaries: bitcoind-postgres
            seed: 1
            args: backend=bitcoind dbbackend=postgres
          - name: bitcoind-postgres-nativesql
            binaries: bitcoind-postgres
            seed: 2
            args: backend=bitcoind dbbackend=postgres nativesql=true
          - name: bitcoind-postgres-nativesql-experiment
            binaries: bitcoind-postgres-experiment
            seed: 3
            args: backend=bitcoind dbbackend=postgres nativesql=true tags=test_native_sql
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - name: Check for no-itest label
        id: check-label
        uses: ./.github/actions/check-label
        with:
          label: 'no-itest'
          skip-message: "Tests auto-passed due to 'no-itest' label"

      - name: Download itest binaries
        if: steps.check-label.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: itest-binaries-${{ matrix.config.binaries }}
          path: itest

      - name: Make itest binaries executable
        if: steps.check-label.outputs.skip != 'true'
        run: chmod +x itest/itest.test itest/lnd-itest itest/btcd-itest

      - name: Install bitcoind
        if: steps.check-label.outputs.skip != 'true'
        run: ./scripts/install_bitcoind.sh $BITCOIN_VERSION

      - name: Run ${{ matrix.config.name }} tranche group ${{ matrix.tranche_group }}
        if: steps.check-label.outputs.skip != 'true'
        run: |
          OFFSET=$((${{ matrix.tranche_group }} * ${{ env.SPLIT_ITEST_PARALLELISM }}))
          make itest-only-parallel tranches=${{ env.SPLIT_TRANCHES }} \
            parallel=${{ env.SPLIT_ITEST_PARALLELISM }} trancheoffset=$OFFSET \
            ${{ matrix.config.args }} \
            shuffleseed=${{ github.run_id }}${{ matrix.config.seed }}

      - name: Zip log files on failure
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        timeout-minutes: 5 # timeout after 5 minute
        run: 7z a logs-itest-${{ matrix.config.name }}-${{ matrix.tranche_group }}.zip itest/**/*.log

      - name: Upload log files on failure
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        with:
          name: logs-itest-${{ matrix.config.name }}-${{ matrix.tranche_group }}
          path: logs-itest-${{ matrix.config.name }}-${{ matrix.tranche_group }}.zip
          retention-days: 5

  ########################
  # run windows integration test
  ########################
  windows-integration-test:
    name: Run windows itest
    runs-on: windows-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for no-itest label
        id: check-label
        uses: ./.github/actions/check-label
        with:
          label: 'no-itest'
          skip-message: "Tests auto-passed due to 'no-itest' label"

      - name: Fetch and rebase on ${{ github.base_ref }}
        if: github.event_name == 'pull_request' && steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/rebase

      - name: Setup go ${{ env.GO_VERSION }}
        if: steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          key-prefix: integration-test

      - name: Run itest
        if: steps.check-label.outputs.skip != 'true'
        run: make itest-parallel tranches=${{ env.SMALL_TRANCHES }} windows=1 shuffleseed=${{ github.run_id }}
        
      - name: Kill any remaining lnd processes
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        shell: powershell
        run: taskkill /IM lnd-itest.exe /T /F

      - name: Zip log files on failure
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        timeout-minutes: 5 # timeout after 5 minute
        run: 7z a logs-itest-windows.zip itest/**/*.log

      - name: Upload log files on failure
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        with:
          name: logs-itest-windows
          path: logs-itest-windows.zip
          retention-days: 5

  ########################
  # run macOS integration test
  ########################
  macos-integration-test:
    name: Run macOS itest
    runs-on: macos-14
    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for no-itest label
        id: check-label
        uses: ./.github/actions/check-label
        with:
          label: 'no-itest'
          skip-message: "Tests auto-passed due to 'no-itest' label"

      - name: Fetch and rebase on ${{ github.base_ref }}
        if: github.event_name == 'pull_request' && steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/rebase

      - name: Setup go ${{ env.GO_VERSION }}
        if: steps.check-label.outputs.skip != 'true'
        uses: ./.github/actions/setup-go
        with:
          go-version: '${{ env.GO_VERSION }}'
          key-prefix: integration-test

      - name: Run itest
        if: steps.check-label.outputs.skip != 'true'
        run: make itest-parallel tranches=${{ env.SMALL_TRANCHES }} shuffleseed=${{ github.run_id }}

      - name: Zip log files on failure
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        timeout-minutes: 5 # timeout after 5 minute
        run: 7z a logs-itest-macos.zip itest/**/*.log

      - name: Upload log files on failure
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.check-label.outputs.skip != 'true' }}
        with:
          name: logs-itest-macos
          path: logs-itest-macos.zip
          retention-days: 5

  ########################
  # Backwards Compatibility Test
  ########################
  backwards-compatibility-test:
    name: Backwards compatibility test
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🛡️ Backwards compatibility test
        run: make backwards-compat-test

      - name: 📋 Upload node logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bw-compat-logs
          path: scripts/bw-compatibility-test/logs/
          retention-days: 7

  #########################################
  # Auto Cache Cleanup on Pull Requests
  #########################################
  auto-cleanup-cache:
    name: Cache Cleanup
    runs-on: ubuntu-latest

    # This condition checks for pull requests from authors with write access.
    if: >-
      contains('OWNER, MEMBER, COLLABORATOR', github.event.pull_request.author_association)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Delete caches older than 12 hours
        continue-on-error: true
        env:
          # GITHUB_TOKEN is required for the gh CLI.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Finding caches not used in the last 12 hours..."

          # Get the current time and the cutoff time (12 hours ago) in Unix
          # timestamp format.
          cutoff_timestamp=$(date -d "12 hours ago" +%s)

          # Use gh and jq to parse caches. Delete any cache last accessed
          # before the cutoff time.
          gh cache list --json key,lastAccessedAt | jq -r '.[] |
          select(.lastAccessedAt != null) | "\(.lastAccessedAt) \(.key)"' |
          while read -r last_accessed_at key; do
            last_accessed_timestamp=$(date -d "$last_accessed_at" +%s)

            if (( last_accessed_timestamp < cutoff_timestamp )); then
              echo "Deleting old cache. Key: $key, Last Used: $last_accessed_at"
              gh cache delete "$key"
            fi
          done

  # Notify about the completion of all coverage collecting jobs.
  finish:
    name: Send coverage report
    if: ${{ !cancelled() }}
    needs: [unit-test, basic-integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send coverage
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          parallel-finished: true
