syntax = "proto3";

package devrpc;

import "lightning.proto";

option go_package = "github.com/lightningnetwork/lnd/lnrpc/devrpc";

/*
 * Comments in this file will be directly parsed into the API
 * Documentation as descriptions of the associated method, message, or field.
 * These descriptions should go right above the definition of the object, and
 * can be in either block or // comment format.
 *
 * An RPC method can be matched to an lncli command by placing a line in the
 * beginning of the description in exactly the following format:
 * lncli: `methodname`
 *
 * Failure to specify the exact name of the command will cause documentation
 * generation to fail.
 *
 * More information on how exactly the gRPC documentation is generated from
 * this proto file can be found here:
 * https://github.com/lightninglabs/lightning-api
 */

service Dev {
    /* lncli: `importgraph`
    ImportGraph imports a ChannelGraph into the graph database. Should only be
    used for development.
    */
    rpc ImportGraph (lnrpc.ChannelGraph) returns (ImportGraphResponse);

    /*
    Quiesce instructs a channel to initiate the quiescence (stfu) protocol. This
    RPC is for testing purposes only. The commit that adds it will be removed
    once interop is confirmed.
    */
    rpc Quiesce (QuiescenceRequest) returns (QuiescenceResponse);

    /* lncli: `fetchreputation`
    FetchReputation returns a read-only snapshot of the local reputation
    subsystem's computed per-channel state. It requires the experimental
    read-only reputation subsystem to be enabled via the --routing.reputation
    flag; otherwise it returns an error. This RPC never mutates state and never
    affects routing.
    */
    rpc FetchReputation (FetchReputationRequest)
        returns (FetchReputationResponse);
}

message ImportGraphResponse {
}

message QuiescenceRequest {
    // The channel point of the channel we wish to quiesce
    lnrpc.ChannelPoint chan_id = 1;
}

message QuiescenceResponse {
    // Indicates whether or not we hold the initiator role or not once the
    // negotiation completes
    bool initiator = 1;
}

message FetchReputationRequest {
}

message FetchReputationResponse {
    // The per-channel reputation snapshots, ordered by short channel id.
    repeated ChannelReputation channel_reputations = 1;
}

// ChannelReputation is a read-only view of one channel's computed reputation
// state, as of the snapshot time.
message ChannelReputation {
    // The short channel id of the channel.
    uint64 scid = 1;

    // The reputation this channel has accrued as an outgoing link, decayed to
    // the snapshot time.
    int64 outgoing_reputation = 2;

    // The revenue threshold this channel has earned as an incoming link,
    // decayed to the snapshot time.
    int64 incoming_revenue = 3;

    // The summed in-flight risk of this channel's pending HTLCs.
    uint64 in_flight_risk = 4;

    // The number of in-flight HTLCs for which this channel is the outgoing
    // link.
    uint32 pending_htlc_count = 5;

    // Whether the channel's accrued outgoing reputation, net of its current
    // in-flight risk, already meets its incoming revenue threshold.
    bool sufficient_reputation = 6;
}
